name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: yaaf-win-amd64
            build_dir: build
            package_dir: build\package\yaaf-win-amd64
            executable: build\app\yaaf.exe
            lua_dir: build\app\lua
            examples_dir: build\app\examples
            ctest_enabled: false
          - os: ubuntu-latest
            artifact_name: yaaf-linux-ubuntu-amd64
            build_dir: build
            package_dir: build/package/yaaf-linux-ubuntu-amd64
            executable: build/app/yaaf
            lua_dir: build/app/lua
            examples_dir: build/app/examples
            ctest_enabled: true
          - os: macos-latest
            artifact_name: yaaf-macos
            build_dir: build
            package_dir: build/package/yaaf-macos
            executable: build/app/yaaf
            lua_dir: build/app/lua
            examples_dir: build/app/examples
            ctest_enabled: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout vcpkg
        uses: actions/checkout@v6
        with:
          repository: microsoft/vcpkg
          ref: e5a4f54c0d562059e9ccc6f7e7150667da58fe41
          path: vcpkg

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Set up MSVC developer shell
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Select clang on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          echo 'CC=clang' >> "$GITHUB_ENV"
          echo 'CXX=clang++' >> "$GITHUB_ENV"
          clang --version
          clang++ --version

      - name: Bootstrap vcpkg on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\vcpkg\bootstrap-vcpkg.bat

      - name: Bootstrap vcpkg on non-Windows
        if: runner.os != 'Windows'
        shell: bash
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Configure CMake on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: >-
          cmake -S . -B ${{ matrix.build_dir }} -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DVCPKG_TARGET_TRIPLET=x64-windows-static-md
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Configure CMake on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: >-
          cmake -S . -B ${{ matrix.build_dir }} -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Configure CMake on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: >-
          cmake -S . -B ${{ matrix.build_dir }} -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=${{ env.CC }}
          -DCMAKE_CXX_COMPILER=${{ env.CXX }}
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build yaaf
        run: cmake --build ${{ matrix.build_dir }} --config Release --target yaaf

      - name: Build unit tests
        if: matrix.ctest_enabled
        run: cmake --build ${{ matrix.build_dir }} --config Release --target libyaaf_tests

      - name: Run unit tests
        if: matrix.ctest_enabled
        run: ctest --test-dir ${{ matrix.build_dir }} --output-on-failure -L default

      - name: Package bundle on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path '${{ matrix.package_dir }}' -Force | Out-Null
          Copy-Item '${{ matrix.executable }}' '${{ matrix.package_dir }}\yaaf.exe'
          Copy-Item '${{ matrix.lua_dir }}' '${{ matrix.package_dir }}\lua' -Recurse -Force
          Copy-Item '${{ matrix.examples_dir }}' '${{ matrix.package_dir }}\examples' -Recurse -Force

      - name: Package bundle on non-Windows
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p '${{ matrix.package_dir }}'
          cp '${{ matrix.executable }}' '${{ matrix.package_dir }}/yaaf'
          cp -R '${{ matrix.lua_dir }}' '${{ matrix.package_dir }}/lua'
          cp -R '${{ matrix.examples_dir }}' '${{ matrix.package_dir }}/examples'

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_dir }}
          if-no-files-found: error

  linux-runtime-compat:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro_name: ubuntu-24.04
            image: ubuntu:24.04
            expected_result: pass
          - distro_name: ubuntu-22.04
            image: ubuntu:22.04
            expected_result: glibc-floor

    steps:
      - name: Download Linux bundle artifact
        uses: actions/download-artifact@v6
        with:
          name: yaaf-linux-ubuntu-amd64
          path: runtime-smoke/yaaf-linux-ubuntu-amd64

      - name: Verify downloaded Linux bundle
        shell: bash
        run: |
          test -f runtime-smoke/yaaf-linux-ubuntu-amd64/yaaf
          test -d runtime-smoke/yaaf-linux-ubuntu-amd64/lua
          test -d runtime-smoke/yaaf-linux-ubuntu-amd64/examples
          chmod +x runtime-smoke/yaaf-linux-ubuntu-amd64/yaaf

      - name: Smoke test Ubuntu runtime on ${{ matrix.distro_name }}
        shell: bash
        run: |
          log_file="$RUNNER_TEMP/linux-runtime-${{ matrix.distro_name }}.log"
          if docker run --rm \
            -v "${{ github.workspace }}/runtime-smoke/yaaf-linux-ubuntu-amd64:/bundle:ro" \
            --workdir /bundle \
            ${{ matrix.image }} \
            /bin/bash -lc '
              set -euo pipefail
              ./yaaf --help > /tmp/yaaf-help.txt
              grep -q "Usage:" /tmp/yaaf-help.txt
              ./yaaf examples/example.lua smoke-test > /tmp/yaaf-example.txt
              grep -q "yaaf example" /tmp/yaaf-example.txt
              grep -q "args: smoke-test" /tmp/yaaf-example.txt
            ' >"$log_file" 2>&1; then
            status=0
          else
            status=$?
          fi

          cat "$log_file"

          if [[ "${{ matrix.expected_result }}" == "pass" ]]; then
            [[ $status -eq 0 ]]
          else
            [[ $status -ne 0 ]]
            grep -Eq 'GLIBC_2\.38|GLIBCXX_3\.4\.3[12]' "$log_file"
          fi
