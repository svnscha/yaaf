name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: yaaf-win-amd64
            build_dir: build
            package_dir: build\package\yaaf-win-amd64
            executable: build\app\yaaf.exe
            lua_dir: build\app\lua
            examples_dir: build\app\examples
            ctest_enabled: false
          - os: macos-latest
            artifact_name: yaaf-macos
            build_dir: build
            package_dir: build/package/yaaf-macos
            executable: build/app/yaaf
            lua_dir: build/app/lua
            examples_dir: build/app/examples
            ctest_enabled: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Set up MSVC developer shell
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Bootstrap vcpkg on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\vcpkg\bootstrap-vcpkg.bat

      - name: Bootstrap vcpkg on non-Windows
        if: runner.os != 'Windows'
        shell: bash
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Configure CMake on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: >-
          cmake -S . -B ${{ matrix.build_dir }} -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DVCPKG_TARGET_TRIPLET=x64-windows-static-md
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Configure CMake on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: >-
          cmake -S . -B ${{ matrix.build_dir }} -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build yaaf
        run: cmake --build ${{ matrix.build_dir }} --config Release --target yaaf

      - name: Build unit tests
        if: matrix.ctest_enabled
        run: cmake --build ${{ matrix.build_dir }} --config Release --target libyaaf_tests

      - name: Run unit tests
        if: matrix.ctest_enabled
        run: ctest --test-dir ${{ matrix.build_dir }} --output-on-failure -L default

      - name: Package bundle on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path '${{ matrix.package_dir }}' -Force | Out-Null
          Copy-Item '${{ matrix.executable }}' '${{ matrix.package_dir }}\yaaf.exe'
          Copy-Item '${{ matrix.lua_dir }}' '${{ matrix.package_dir }}\lua' -Recurse -Force
          Copy-Item '${{ matrix.examples_dir }}' '${{ matrix.package_dir }}\examples' -Recurse -Force

      - name: Package bundle on non-Windows
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p '${{ matrix.package_dir }}'
          cp '${{ matrix.executable }}' '${{ matrix.package_dir }}/yaaf'
          cp -R '${{ matrix.lua_dir }}' '${{ matrix.package_dir }}/lua'
          cp -R '${{ matrix.examples_dir }}' '${{ matrix.package_dir }}/examples'

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_dir }}
          if-no-files-found: error

  linux-musl-build:
    runs-on: ubuntu-latest
    container:
      image: alpine:3.20
    env:
      CC: clang
      CXX: clang++
      VCPKG_FORCE_SYSTEM_BINARIES: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux musl build dependencies
        shell: sh
        run: |
          apk add --no-cache \
            bash \
            build-base \
            ca-certificates \
            clang18 \
            clang18-extra-tools \
            curl \
            file \
            git \
            lld \
            lldb \
            linux-headers \
            ninja-build \
            perl \
            pkgconf \
            py3-pip \
            python3 \
            tar \
            unzip \
            xz \
            zip
          ln -sf /usr/bin/clang-18 /usr/bin/clang
          ln -sf /usr/bin/clang++-18 /usr/bin/clang++
          ln -sf /usr/bin/clangd-18 /usr/bin/clangd
          ln -sf /usr/bin/clang-scan-deps-18 /usr/bin/clang-scan-deps
          python3 -m pip install --break-system-packages --no-cache-dir 'cmake==4.3.2'
          cmake_bin_dir="$(python3 -c 'import cmake; print(cmake.CMAKE_BIN_DIR)')"
          ln -sf "${cmake_bin_dir}/cmake" /usr/local/bin/cmake
          ln -sf "${cmake_bin_dir}/ccmake" /usr/local/bin/ccmake
          ln -sf "${cmake_bin_dir}/cpack" /usr/local/bin/cpack
          ln -sf "${cmake_bin_dir}/ctest" /usr/local/bin/ctest
          curl -fsSL 'https://github.com/ninja-build/ninja/archive/refs/tags/v1.13.2.tar.gz' -o /tmp/ninja-src.tar.gz
          tar -xzf /tmp/ninja-src.tar.gz -C /tmp
          cd /tmp/ninja-1.13.2
          python3 configure.py --bootstrap
          install -m 0755 ninja /usr/local/bin/ninja
          ln -sf /usr/local/bin/ninja /usr/bin/ninja
          rm -rf /tmp/ninja-src.tar.gz /tmp/ninja-1.13.2

      - name: Set up vcpkg
        shell: bash
        run: bash ./.devcontainer/setup-vcpkg.sh

      - name: Configure CMake
        shell: bash
        run: cmake --preset linux-musl-static

      - name: Build yaaf
        shell: bash
        run: cmake --build build/linux-musl-static --config Release --target yaaf

      - name: Build unit tests
        shell: bash
        run: cmake --build build/linux-musl-static --config Release --target libyaaf_tests

      - name: Run unit tests
        shell: bash
        run: ctest --test-dir build/linux-musl-static --output-on-failure -L default

      - name: Package Linux musl bundle
        shell: bash
        run: |
          package_dir='build/package/yaaf-linux-musl-static-amd64'
          mkdir -p "$package_dir"
          cp 'build/linux-musl-static/app/yaaf' "$package_dir/yaaf"
          cp -R 'build/linux-musl-static/app/lua' "$package_dir/lua"
          cp -R 'build/linux-musl-static/app/examples' "$package_dir/examples"

      - name: Verify Linux musl binary is statically linked
        shell: bash
        run: |
          file_output="$(file build/package/yaaf-linux-musl-static-amd64/yaaf)"
          printf '%s\n' "$file_output"
          grep -q 'statically linked' <<<"$file_output"

      - name: Upload Linux musl bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: yaaf-linux-musl-static-amd64
          path: build/package/yaaf-linux-musl-static-amd64
          if-no-files-found: error

  linux-runtime-smoke:
    needs: linux-musl-build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: alpine:3.20
            label: alpine-3.20
          - image: debian:bookworm-slim
            label: debian-bookworm-slim

    steps:
      - name: Download Linux bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: yaaf-linux-musl-static-amd64
          path: runtime-smoke/yaaf-linux-musl-static-amd64

      - name: Verify downloaded Linux bundle
        shell: bash
        run: |
          test -f runtime-smoke/yaaf-linux-musl-static-amd64/yaaf
          test -d runtime-smoke/yaaf-linux-musl-static-amd64/lua
          test -d runtime-smoke/yaaf-linux-musl-static-amd64/examples
          chmod +x runtime-smoke/yaaf-linux-musl-static-amd64/yaaf

      - name: Smoke test Linux musl runtime on ${{ matrix.label }}
        shell: bash
        run: |
          log_file="$RUNNER_TEMP/linux-runtime-${{ matrix.label }}.log"
          if docker run --rm \
            -v "${{ github.workspace }}/runtime-smoke/yaaf-linux-musl-static-amd64:/bundle:ro" \
            --workdir /bundle \
            ${{ matrix.image }} \
            /bin/sh -lc '
              set -eu
              ./yaaf --help > /tmp/yaaf-help.txt
              grep -q "Usage:" /tmp/yaaf-help.txt
              ./yaaf run examples/example.lua smoke-test > /tmp/yaaf-example.txt
              grep -q "yaaf example" /tmp/yaaf-example.txt
              grep -q "args: smoke-test" /tmp/yaaf-example.txt
            ' >"$log_file" 2>&1; then
            status=0
          else
            status=$?
          fi

          cat "$log_file"
          [[ $status -eq 0 ]]
