name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: yaaf-win-amd64
            build_dir: build
            package_dir: build\package\yaaf-win-amd64
            executable: build\app\Release\yaaf.exe
            ctest_enabled: false
          - os: macos-latest
            artifact_name: yaaf-macos
            build_dir: build
            package_dir: build/package/yaaf-macos
            executable: build/app/yaaf
            ctest_enabled: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Bootstrap vcpkg on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\vcpkg\bootstrap-vcpkg.bat

      - name: Bootstrap vcpkg on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Configure CMake on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: >-
          cmake -S . -B ${{ matrix.build_dir }} -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Configure CMake on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: >-
          cmake -S . -B ${{ matrix.build_dir }} -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build yaaf
        run: cmake --build ${{ matrix.build_dir }} --config Release --target yaaf

      - name: Build unit tests on macOS
        if: matrix.ctest_enabled
        run: cmake --build ${{ matrix.build_dir }} --config Release --target libyaaf_tests

      - name: Run unit tests on macOS
        if: matrix.ctest_enabled
        run: ctest --test-dir ${{ matrix.build_dir }} --output-on-failure -L default

      - name: Package bundle on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path '${{ matrix.package_dir }}' -Force | Out-Null
          Copy-Item '${{ matrix.executable }}' '${{ matrix.package_dir }}\yaaf.exe'
          Copy-Item 'build\app\Release\lua' '${{ matrix.package_dir }}\lua' -Recurse -Force
          Copy-Item 'build\app\Release\examples' '${{ matrix.package_dir }}\examples' -Recurse -Force

      - name: Package bundle on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p '${{ matrix.package_dir }}'
          cp '${{ matrix.executable }}' '${{ matrix.package_dir }}/yaaf'
          cp -R build/app/lua '${{ matrix.package_dir }}/lua'
          cp -R build/app/examples '${{ matrix.package_dir }}/examples'

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.package_dir }}
          if-no-files-found: error
