name: Dependabot Auto-Merge

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: write
  pull-requests: write

jobs:
  validate:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    outputs:
      update-type: ${{ steps.metadata.outputs.update-type }}
      ecosystem: ${{ steps.metadata.outputs.package-ecosystem }}
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          ref: e5a4f54c0d562059e9ccc6f7e7150667da58fe41
          path: vcpkg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Set up Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Install docs dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Validate fixture scripts
        run: python -m compileall mcp-servers

      - name: Build docs
        run: python -m mkdocs build --strict

      - name: Bootstrap vcpkg
        run: ./vcpkg/bootstrap-vcpkg.sh

      - name: Configure CMake
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build yaaf and tests
        run: cmake --build build --config Release --target yaaf libyaaf_tests

      - name: Run unit tests
        run: ctest --test-dir build --output-on-failure -L default

  auto-merge:
    needs: validate
    if: |
      github.actor == 'dependabot[bot]' &&
      (needs.validate.outputs.update-type == 'version-update:semver-minor' ||
       needs.validate.outputs.update-type == 'version-update:semver-patch')
    runs-on: ubuntu-latest
    steps:
      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}