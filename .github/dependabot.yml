version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "svnscha"
    assignees:
      - "svnscha"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "pip"
    groups:
      pip-root-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      pip-root-major:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "pip"
    directory: "/mcp-servers"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    reviewers:
      - "svnscha"
    assignees:
      - "svnscha"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "pip"
    groups:
      pip-mcp-servers-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      pip-mcp-servers-major:
        patterns:
          - "*"
        update-types:
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    reviewers:
      - "svnscha"
    assignees:
      - "svnscha"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      github-actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      github-actions-major:
        patterns:
          - "*"
        update-types:
          - "major"